name: Build Book (PDF & EPUB)

on:
  push:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-book:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            texlive-xetex \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-plain-generic \
            lmodern \
            librsvg2-bin \
            imagemagick \
            chromium-browser

      - name: Install mermaid-cli
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Build PDF and EPUB
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
        run: ./scripts/build-book/build-book.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: book
          path: |
            build/book/Community-Network-Handbook.pdf
            build/book/Community-Network-Handbook.epub

      - name: Prepare release metadata
        if: github.event_name == 'push'
        id: release_meta
        run: |
          echo "tag=book-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "title=Book build for ${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          {
            echo 'notes<<EOF'
            echo "Automated PDF and EPUB build for commit ${GITHUB_SHA}."
            echo
            echo "Source commit: https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release for main commit
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "${{ steps.release_meta.outputs.tag }}" >/dev/null 2>&1; then
            gh release create "${{ steps.release_meta.outputs.tag }}" \
              --title "${{ steps.release_meta.outputs.title }}" \
              --notes "${{ steps.release_meta.outputs.notes }}"
          fi

      - name: Attach to GitHub Release
        if: github.event_name == 'release' || github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ steps.release_meta.outputs.tag }}"
          fi

          gh release upload "$TAG" \
            build/book/Community-Network-Handbook.pdf \
            build/book/Community-Network-Handbook.epub \
            --clobber
